<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1877f2">
  <title>Hangout Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="inbox-panel" aria-label="Conversations">
      <header class="inbox-header">
        <div class="brand-row">
          <h1 class="brand-title"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7.2 6.4h9.6a4.2 4.2 0 0 1 4.2 4.2v2.8a4.2 4.2 0 0 1-4.2 4.2H11l-3.8 2.5.8-2.5H7.2A4.2 4.2 0 0 1 3 13.4v-2.8a4.2 4.2 0 0 1 4.2-4.2Z"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/></svg></span><span>Hangout Chat</span></h1>
          <a class="home-button" href="../" title="Back to Hangout Posts" aria-label="Back to Hangout Posts"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 6 4 12l6 6M5 12h15"/></svg></a>
          <button id="theme-toggle" class="icon-button theme-toggle" type="button" title="Switch to dark theme" aria-label="Switch to dark theme">☾</button>
          <button id="new-chat-button" class="icon-button primary" title="New message" aria-label="New message"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.7 4.3 5 5M4 20l4.2-1 10.5-10.5a1.8 1.8 0 0 0-2.5-2.5L5.7 16.5 4 20Z"/></svg></button>
        </div>
        <label class="search-box">
          <span>⌕</span>
          <input id="conversation-search" type="search" autocomplete="off" placeholder="Search messages">
        </label>
      </header>

      <div id="signed-out-card" class="signed-out-card">
        <strong>Sign in to message people</strong>
        <p>Your Hangout Posts account works here too.</p>
        <button id="show-auth-button" class="button primary-button">Sign in</button>
      </div>
      <div id="conversation-list" class="conversation-list" aria-live="polite"></div>
    </aside>

    <main class="chat-panel">
      <section id="empty-state" class="empty-state">
        <div class="empty-icon">✉</div>
        <h2>Your messages</h2>
        <p>Choose a conversation or start a new one.</p>
        <button id="empty-new-chat-button" class="button primary-button">New message</button>
      </section>

      <section id="active-chat" class="active-chat hidden" aria-label="Active conversation">
        <header class="chat-header">
          <button id="mobile-back-button" class="icon-button mobile-only" aria-label="Back to conversations">‹</button>
          <span id="chat-avatar-wrap"><img id="chat-avatar" class="avatar large" alt=""></span>
          <div class="chat-heading">
            <h2 id="chat-name">Conversation</h2>
            <p id="chat-status">Offline</p>
          </div>
          <button id="conversation-options-button" class="icon-button chat-options" type="button" aria-label="Conversation options" title="Conversation options">•••</button>
        </header>
        <div id="message-list" class="message-list" aria-live="polite"></div>
        <form id="message-form" class="composer">
          <div id="reply-banner" class="reply-banner hidden"><span id="reply-banner-text"></span><button id="cancel-reply-button" type="button" aria-label="Cancel reply">&times;</button></div>
          <label class="attach-button" title="Attach photo" aria-label="Attach photo">&#128206;<input id="image-input" type="file" accept="image/jpeg,image/png,image/webp" hidden></label>
          <textarea id="message-input" rows="1" maxlength="1500" placeholder="Type a message" aria-label="Message"></textarea>
          <button id="send-button" class="send-button" type="submit" aria-label="Send message">➤</button>
        </form>
      </section>
    </main>
  </div>

  <dialog id="people-dialog" class="dialog">
    <form method="dialog" class="dialog-card" id="people-form">
      <header class="dialog-header">
        <h2 id="people-dialog-title">New message</h2>
        <button type="button" id="toggle-group-mode" class="group-toggle-btn">Create Group</button>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </header>
      <label class="search-box dialog-search">
        <span>⌕</span>
        <input id="people-search" type="search" autocomplete="off" placeholder="Search members">
      </label>
      <div id="people-list" class="people-list"></div>
      <div id="group-action-bar" class="hidden" style="padding-top: 10px;">
        <button id="start-group-btn" class="button primary-button" type="button" style="width:100%">Start Group Chat</button>
      </div>
    </form>
  </dialog>

  <dialog id="auth-dialog" class="dialog">
    <form id="auth-form" class="dialog-card auth-card">
      <header class="dialog-header">
        <h2 id="auth-title">Sign in</h2>
        <button type="button" id="close-auth-button" class="icon-button" aria-label="Close">×</button>
      </header>
      <p class="auth-intro">Use the same account as Hangout Posts.</p>
      <label>Email<input id="auth-email" type="email" autocomplete="email" required></label>
      <label>Password<input id="auth-password" type="password" autocomplete="current-password" minlength="6" required></label>
      <p id="auth-error" class="auth-error hidden"></p>
      <button id="auth-submit" class="button primary-button" type="submit">Sign in</button>
      <button id="auth-toggle" class="text-button" type="button">Need an account? Create one</button>
    </form>
  </dialog>

  <dialog id="conversation-dialog" class="dialog">
    <section class="dialog-card conversation-dialog-card">
      <header class="dialog-header">
        <h2>Conversation options</h2>
        <button id="close-conversation-dialog" type="button" class="icon-button" aria-label="Close">×</button>
      </header>
      <!-- DM-only -->
      <button id="set-nickname-button" class="conversation-action" type="button"><span>Set Nickname</span><small>Change how this person appears to you.</small></button>
      <!-- Group-only -->
      <button id="set-my-nickname-button" class="conversation-action hidden" type="button"><span>Set My Nickname</span><small>Change how you appear in this group.</small></button>
      <button id="rename-group-button" class="conversation-action hidden" type="button"><span>Rename Group</span><small>Change the group chat title.</small></button>
      <label id="set-group-photo-button" class="conversation-action hidden" type="button">
        <span>Set Group Photo</span><small>Choose a custom image for the group.</small>
        <input type="file" id="group-photo-input" accept="image/*" style="display:none;">
      </label>
      <button id="add-member-button" class="conversation-action hidden" type="button"><span>Add Member</span><small>Add new members to this group.</small></button>
      <button id="show-members-button" class="conversation-action hidden" type="button"><span>Show Members</span><small>See everyone in this group.</small></button>
      <button id="kick-member-button" class="conversation-action hidden" type="button"><span>Kick Member</span><small>Remove someone from the group.</small></button>
      <button id="leave-group-button" class="conversation-action danger hidden" type="button"><span>Leave Group</span><small>Leave this group chat. You can rejoin if re-added.</small></button>
      <!-- Common -->
      <button id="clear-chat-button" class="conversation-action" type="button"><span>Clear messages for me</span><small>Hides this chat's existing messages only on this account.</small></button>
      <button id="remove-conversation-button" class="conversation-action danger" type="button"><span>Remove conversation</span><small>Removes it from your inbox. Other members keep their copy.</small></button>
    </section>
  </dialog>

  <dialog id="app-modal" class="dialog">
    <div class="dialog-card">
      <header class="dialog-header">
        <h2 id="app-modal-title">Confirm</h2>
        <button id="app-modal-close" type="button" class="icon-button" aria-label="Close">×</button>
      </header>
      <div id="app-modal-body" class="app-modal-body"></div>
      <footer class="app-modal-footer">
        <button id="app-modal-cancel" class="app-modal-btn cancel" type="button">Cancel</button>
        <button id="app-modal-confirm" class="app-modal-btn primary" type="button">Confirm</button>
      </footer>
    </div>
  </dialog>

  <div id="message-action-menu" class="message-action-menu hidden" role="menu" aria-label="Message actions"></div>
  <div id="toast" class="toast hidden" role="status"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
