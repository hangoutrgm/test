<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1877f2">
  <title>Hangout Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="inbox-panel" aria-label="Conversations">
      <header class="inbox-header">
        <div class="brand-row">
          <h1>Hangout Chat</h1>
          <a class="icon-button" href="../" title="Back to Hangout Posts" aria-label="Back to Hangout Posts">&larr;</a>
          <button id="new-chat-button" class="icon-button primary" title="New message" aria-label="New message">✎</button>
        </div>
        <label class="search-box">
          <span>⌕</span>
          <input id="conversation-search" type="search" autocomplete="off" placeholder="Search messages">
        </label>
      </header>

      <div id="signed-out-card" class="signed-out-card">
        <strong>Sign in to message people</strong>
        <p>Your Hangout Posts account works here too.</p>
        <button id="show-auth-button" class="button primary-button">Sign in</button>
      </div>
      <div id="conversation-list" class="conversation-list" aria-live="polite"></div>
    </aside>

    <main class="chat-panel">
      <section id="empty-state" class="empty-state">
        <div class="empty-icon">✉</div>
        <h2>Your messages</h2>
        <p>Choose a conversation or start a new one.</p>
        <button id="empty-new-chat-button" class="button primary-button">New message</button>
      </section>

      <section id="active-chat" class="active-chat hidden" aria-label="Active conversation">
        <header class="chat-header">
          <button id="mobile-back-button" class="icon-button mobile-only" aria-label="Back to conversations">‹</button>
          <img id="chat-avatar" class="avatar large" alt="">
          <div class="chat-heading">
            <h2 id="chat-name">Conversation</h2>
            <p id="chat-status">Offline</p>
          </div>
        </header>
        <div id="message-list" class="message-list" aria-live="polite"></div>
        <form id="message-form" class="composer">
          <div id="reply-banner" class="reply-banner hidden"><span id="reply-banner-text"></span><button id="cancel-reply-button" type="button" aria-label="Cancel reply">&times;</button></div>
          <label class="attach-button" title="Attach photo" aria-label="Attach photo">&#128206;<input id="image-input" type="file" accept="image/jpeg,image/png,image/webp" hidden></label>
          <textarea id="message-input" rows="1" maxlength="1500" placeholder="Type a message" aria-label="Message"></textarea>
          <button id="send-button" class="send-button" type="submit" aria-label="Send message">➤</button>
        </form>
      </section>
    </main>
  </div>

  <dialog id="people-dialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <header class="dialog-header">
        <h2>New message</h2>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </header>
      <label class="search-box dialog-search">
        <span>⌕</span>
        <input id="people-search" type="search" autocomplete="off" placeholder="Search members">
      </label>
      <div id="people-list" class="people-list"></div>
    </form>
  </dialog>

  <dialog id="auth-dialog" class="dialog">
    <form id="auth-form" class="dialog-card auth-card">
      <header class="dialog-header">
        <h2 id="auth-title">Sign in</h2>
        <button type="button" id="close-auth-button" class="icon-button" aria-label="Close">×</button>
      </header>
      <p class="auth-intro">Use the same account as Hangout Posts.</p>
      <label>Email<input id="auth-email" type="email" autocomplete="email" required></label>
      <label>Password<input id="auth-password" type="password" autocomplete="current-password" minlength="6" required></label>
      <p id="auth-error" class="auth-error hidden"></p>
      <button id="auth-submit" class="button primary-button" type="submit">Sign in</button>
      <button id="auth-toggle" class="text-button" type="button">Need an account? Create one</button>
    </form>
  </dialog>

  <div id="toast" class="toast hidden" role="status"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
